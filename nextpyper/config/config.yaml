# Namespaced config file example
nextpyper:
    args: # Command line args will be (over)written here at runtime
        input:
        output:
        probe_pattern: (\d{4})$
        multi_probes:
    # Add customisable config here
    pipeline:
        probes_translation:
            translated_prop: 0.95
            stop_per_1Kbp: 2 
            min_exon_length: 20
        cp_cleaning:
            min_sp_probes_cov: 80
        matching_probes: 
            bbduk_k: 19
            others: -Xmx4g
        multi_probe_clustering:
            mmseq2_min_seq_id: 0.8
        spades:
            k: 55,77
        split_graph_by_matching_probe:
            min_probe_coverage: 0.1
        blast_homolog_filtering:
            homolog_scf_min_cov: 0.05
            homolog_scf_min_idt: 0.8
        region_separation:
            min_probe_contig_sim: 0.85
            min_fragment_cov: 0.1
            min_contig_length: 10