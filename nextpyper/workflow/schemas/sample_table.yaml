$schema: "https://json-schema.org/draft/2020-12/schema"
description: Sample table schema definition
type: object
properties:
  sample:
    type: string
    format: uri
    pattern: "(^[A-Za-z0-9_-]+$)"
    description: sample identifier.
  path_forward:
    type: string
    format: uri
    description: path to fastq(compressed) file containing forward reads.
    pattern: ".*(.fastq.gz|.fq.gz|.fastq|.fq)$"
  path_reverse:
    type: string
    format: uri
    description: path to fastq(compressed) file containing forward reads.
    pattern: ".*(.fastq.gz|.fq.gz|.fastq|.fq)$"
  ploidy:
    type: integer
    default: 0 
    minimum: 0
    description: ploidy level of the sample (optional).

required:
  - sample
  - path_forward
  - path_reverse